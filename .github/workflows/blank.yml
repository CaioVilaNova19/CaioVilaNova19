name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    environment: 
      name: production
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS }}
          
          # 1. CORTANDO O LIXO VISUAL
          # Mantém só o cabeçalho e os repositórios (remove activity e community)
          base: header, repositories
          
          # 2. FOCO EM CÓDIGO E PERFORMANCE (Plugin de Linhas)
          plugin_lines: yes
          plugin_lines_history_limit: 1
          plugin_lines_repositories_limit: 4
          plugin_lines_sections: base
          
          # 3. LINGUAGENS E REPOSITÓRIOS PRIVADOS
          repositories_affiliations: owner, collaborator, organization_member
          plugin_languages: yes
          plugin_languages_ignored: jupyter notebook, html, css, makefile
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 6
          plugin_languages_indepth: yes
