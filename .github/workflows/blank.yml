name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS }}
          
          # Visual limpo, apenas dados puros
          base: ""
          plugin_lines: yes
          
          # LÊ APENAS OS SEUS REPOSITÓRIOS (Ignora Jovian e outras orgs)
          # Se o token tiver permissão 'repo', ele lerá os seus privados aqui.
          repositories_affiliations: owner
          
          # Configuração de Linguagens
          plugin_languages: yes
          plugin_languages_ignored: jupyter notebook, html, css, makefile
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 6
          
          # Força a leitura profunda dos seus commits
          plugin_languages_indepth: yes
          plugin_languages_recent_load: 400
          plugin_languages_recent_days: 365
